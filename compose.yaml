services:
  init:
    build: .
    environment:
      DEMO_MODE: ${DEMO_MODE:-false}
      SKIP_STARTUP_VALIDATION: "true"
    working_dir: /var/www/html
    volumes: [".:/var/www/html", "storage:/var/www/html/storage"]
    command: ["/bin/sh", "docker/init.sh"]
    depends_on:
      mysql:
        condition: service_healthy
    extra_hosts: ["host.docker.internal:host-gateway"]
    restart: "no"

  app:
    build: .
    working_dir: /var/www/html
    volumes: [".:/var/www/html", "storage:/var/www/html/storage"]
    ports: ["8000:8000"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@file_get_contents(\"http://127.0.0.1:8000/up\") === false ? 1 : 0);'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: skyfundi
      MYSQL_USER: skyfundi
      MYSQL_PASSWORD: skyfundi
      MYSQL_ROOT_PASSWORD: root
    ports: ["3307:3306"]
    volumes: ["mysql:/var/lib/mysql"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit
    ports: ["8025:8025", "1025:1025"]
    restart: unless-stopped

  queue:
    build: .
    working_dir: /var/www/html
    volumes: [".:/var/www/html", "storage:/var/www/html/storage"]
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  scheduler:
    build: .
    working_dir: /var/www/html
    volumes: [".:/var/www/html", "storage:/var/www/html/storage"]
    command: ["php", "artisan", "schedule:work"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["redis"]

volumes:
  mysql: {}
  storage: {}
