services:
  app:
    build: .
    working_dir: /var/www/html
    volumes: [".:/var/www/html", "storage:/var/www/html/storage"]
    ports: ["8000:8000"]
    depends_on: {mysql: {condition: service_healthy}}
  mysql:
    image: mysql:8.0
    environment: {MYSQL_DATABASE: skyfundi, MYSQL_USER: skyfundi, MYSQL_PASSWORD: skyfundi, MYSQL_ROOT_PASSWORD: root}
    ports: ["3306:3306"]
    volumes: ["mysql:/var/lib/mysql"]
    healthcheck: {test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"], interval: 5s, timeout: 5s, retries: 20}
  mailpit:
    image: axllent/mailpit
    ports: ["8025:8025", "1025:1025"]
volumes: {mysql: {}, storage: {}}
